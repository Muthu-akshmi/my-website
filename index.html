<!DOCTYPE html>
<html>

    <style>
        body {

            background-color: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;

            text-align: center;

        .container {

        }

            margin-top: 15px;
            font-size: 16px;
            border-radius: 25px;

        }
        button:hover {

            color: white;
            background: #333;
            padding: 8px 12px;
